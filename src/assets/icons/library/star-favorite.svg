<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title>Favorite star</title>
  <desc>Favorite star icon.</desc>
  <defs>
      <linearGradient id="dl-red" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ff2a2a"/>
        <stop offset="100%" stop-color="#8f0808"/>
      </linearGradient>
      <linearGradient id="dl-white" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#b7bac1"/>
      </linearGradient>
      <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#ff0000" flood-opacity="0.38"/>
      </filter>
    </defs>
  <g stroke-linecap="round" stroke-linejoin="round">
    <polygon points="32 10 38 24 54 24 41 34 46 50 32 40 18 50 23 34 10 24 26 24" stroke="url(#dl-white)" stroke-width="3.2"/>
