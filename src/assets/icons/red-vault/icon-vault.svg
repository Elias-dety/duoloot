    <path d="M27 28H37L41 32V40L37 44H27L23 40V32L27 28Z" stroke="url(#dl-red)" stroke-width="3.2" filter="url(#glow-red)"/>
    <path d="M29 32H35L37 34V38L35 40H29" stroke="url(#dl-white)" stroke-width="2.8"/>

