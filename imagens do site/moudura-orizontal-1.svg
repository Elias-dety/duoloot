      <stop offset="50%" stop-color="#090d12"/>
      <stop offset="82%" stop-color="#1b222b"/>
      <stop offset="100%" stop-color="#727a85"/>
    </linearGradient>

    <linearGradient id="metalEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4adb7"/>
      <stop offset="45%" stop-color="#313843"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </linearGradient>

    <linearGradient id="innerRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#220205"/>
      <stop offset="20%" stop-color="#6a0813"/>
      <stop offset="50%" stop-color="#ff2233"/>
      <stop offset="80%" stop-color="#6a0813"/>
      <stop offset="100%" stop-color="#220205"/>
    </linearGradient>

    <linearGradient id="redBarV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0003"/>
      <stop offset="50%" stop-color="#ff2738"/>
      <stop offset="100%" stop-color="#1a0003"/>
    </linearGradient>

    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8ea0"/>
      <stop offset="20%" stop-color="#ff3550"/>
      <stop offset="50%" stop-color="#a00025"/>
      <stop offset="100%" stop-color="#ff2f58"/>
    </linearGradient>

    <radialGradient id="gemGlow" cx="50%" cy="50%" r="55%">
