      <stop offset="45%" stop-color="#ff2d4e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff2d4e" stop-opacity="0"/>
    </radialGradient>

    <filter id="glowRed" x="-60%" y="-60%" width="220%" height="220%">
