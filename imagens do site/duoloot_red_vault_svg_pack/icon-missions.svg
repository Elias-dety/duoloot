<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title>Missions icon</title>
  <desc>Target and mission crosshair icon.</desc>
  <defs>
      <linearGradient id="dl-red" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ff2a2a"/>
        <stop offset="100%" stop-color="#8f0808"/>
      </linearGradient>
      <linearGradient id="dl-white" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#b7bac1"/>
      </linearGradient>
      <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#ff0000" flood-opacity="0.45"/>
      </filter>
    </defs>
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="32" r="16" stroke="url(#dl-white)" stroke-width="3.2"/>
    <circle cx="32" cy="32" r="8" stroke="url(#dl-red)" stroke-width="3.2" filter="url(#glow-red)"/>
    <circle cx="32" cy="32" r="2.5" fill="#ff0000"/>
    <path d="M32 10V16" stroke="url(#dl-white)" stroke-width="3"/>
    <path d="M32 48V54" stroke="url(#dl-white)" stroke-width="3"/>
    <path d="M10 32H16" stroke="url(#dl-white)" stroke-width="3"/>
    <path d="M48 32H54" stroke="url(#dl-white)" stroke-width="3"/>

  </g>
</svg>
